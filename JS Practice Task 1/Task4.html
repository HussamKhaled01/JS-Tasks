<!DOCTYPE html>
<html>

<head>
    <title>Task 4</title>
</head>

<body>
    <script>
        let x = Number(prompt("Enter x:"));
        let y = Number(prompt("Enter y:"));

        let message;

        if (x > y) {
            message = "Hello World";
        } else {
            message = "Goodbye";
        }

        alert(message);
        console.log(message);
        document.write(message);
    </script>
</body>

</html>
