<!DOCTYPE html>
<html>

<head></head>

<body>

    <script>
        let heightArr = [0, 1, 0, 2, 1, 0, 1, 3, 2, 1, 2, 1];
        let totalWater = 0;

        for (let i = 0; i < heightArr.length; i++) {
            let maxLeft = 0;
            let maxRight = 0;

            if (i > 0 && i !== heightArr.length - 1) {
                for (let l = 0; l < i; l++) {
                    if (maxLeft < heightArr[l]) {
                        maxLeft = heightArr[l];
                    }
                }
                for (let r = i + 1; r < heightArr.length; r++) {
                    if (maxRight < heightArr[r]) {
                        maxRight = heightArr[r];
                    }
                }
                let water = Math.min(maxLeft, maxRight) - heightArr[i];

                if (water > 0) {
                    totalWater += water;
                }
            }
        }
        console.log(totalWater);

        // Done 

    </script>

</body>

</html>
