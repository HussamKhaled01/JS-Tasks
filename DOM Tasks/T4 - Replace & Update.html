<!DOCTYPE html>
<html lang="en">

<head>
    <title>Replace and Update</title>
    <style>
        .new-style {
            color: green;
            font-weight: bold;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <div id="box">
        <p id="old-text">I am the old text.</p>
    </div>

    <script>
        const oldParagraph = document.querySelector('#old-text');
        const newParagraph = document.createElement('p');

        newParagraph.textContent = "I am the NEW updated text!";
        newParagraph.classList.add('new-style');

        oldParagraph.replaceWith(newParagraph);
    </script>
</body>

</html>
