<!DOCTYPE html>
<html lang="en">

<head>
    <title>JS Card Builder</title>
    <style>
        .card {
            border: 1px solid #000;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
        }

        .card-img {
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <script>
        const cardDiv = document.createElement('div');
        const cardTitle = document.createElement('h2');
        const cardDesc = document.createElement('p');
        const cardImg = document.createElement('img');

        cardTitle.textContent = "My New Card";
        cardDesc.textContent = "Created using only JavaScript!";
        cardImg.setAttribute('src', 'https://cdn-icons-png.flaticon.com/512/5968/5968292.png');

        cardDiv.classList.add('card');
        cardImg.classList.add('card-img');

        cardDiv.append(cardImg, cardTitle, cardDesc);
        document.body.appendChild(cardDiv);
    </script>
</body>

</html>
