<!DOCTYPE html>
<html lang="en">

<head>
    <title>Traversing Challenge</title>
    <style>
        .highlight {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="main-wrapper">
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3 (Find Me!)</li>
        </ul>
    </div>

    <script>
        const wrapper = document.getElementById('main-wrapper');
        const list = wrapper.firstElementChild;
        const thirdItem = list.children[2];

        thirdItem.classList.add('highlight');
        thirdItem.textContent = "I was found by traversing!";
    </script>
</body>

</html>
