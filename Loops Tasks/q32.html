<!DOCTYPE html>
<html>

<head>
    <title>Javascript Task - Question 32</title>
</head>

<body>

    <p id="q32"></p>

    <script>
        let text = "";
        let sum = 0;

        function isPrime(number) {
            if (number <= 1) {
                return false;
            }
            for (let i = 2; i <= Math.sqrt(number); i++) {
                if (number % i === 0) {
                    return false;
                }
            }
            return true;
        }

        for (let i = 1; i <= 500; i++) {
            sum = 0;
            if (i < 100) {
                let tens = Math.floor(i / 10);
                let ones = i % 10;

                sum = tens + ones;

                if (isPrime(sum)) {
                    text += i + "<br>";
                }
            } else {
                let hundreds = Math.floor(i / 100);
                let tens = Math.floor((i % 100) / 10);
                let ones = i % 10;

                sum = hundreds + tens + ones;

                if (isPrime(sum)) {
                    text += i + "<br>";
                }
            }
        }

        document.getElementById("q32").innerHTML = text;
    </script>

</body>

</html>
