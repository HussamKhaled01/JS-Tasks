<!DOCTYPE html>
<html lang="en">

<head>
    <title>Basic Info Form</title>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            color: #333;
        }

        section {
            width: 100%;
            max-width: 500px;
            background: transparent;
        }

        h1 {
            text-align: center;
            color: #343a40;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        label {
            font-weight: bold;
            width: 120px;
            flex-shrink: 0;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            flex-grow: 1;
            box-sizing: border-box;
        }

        .error-span {
            display: block;
            margin-left: 120px;
            font-size: 12px;
            height: 15px;
            margin-bottom: 15px;
            color: red;
        }

        .button-container {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        button {
            background-color: #1b78d1;
            color: white;
            border: none;
            padding: 12px 0;
            width: 200px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #155da3;
        }

        hr {
            border: 0;
            border-top: 1px solid #ddd;
            margin: 40px 0 20px 0;
        }

        .data-display h3 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #343a40;
        }

        .data-row {
            display: flex;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .data-label {
            width: 120px;
            flex-shrink: 0;
        }

        .data-row span {
            font-weight: normal;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <section>
        <h1>Basic Info Form</h1>

        <form id="infoForm" novalidate>
            <div class="input-group">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName" placeholder="Enter your first name">
            </div>
            <span id="error-firstName" class="error-span"></span>

            <div class="input-group">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName" placeholder="Enter your last name">
            </div>
            <span id="error-lastName" class="error-span"></span>

            <div class="input-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="Email" placeholder="Enter your email">
            </div>
            <span id="error-email" class="error-span"></span>

            <div class="input-group">
                <label for="phone">Phone:</label>
                <input type="text" id="phone" name="phone" placeholder="Enter your phone number">
            </div>
            <span id="error-phone" class="error-span"></span>

            <div class="button-container">
                <button type="submit">Submit</button>
            </div>
        </form>

        <hr>

        <div class="data-display">
            <h3>Submitted Data:</h3>
            <div class="data-row">
                <div class="data-label">First Name:</div>
                <span id="disp-first"></span>
            </div>
            <div class="data-row">
                <div class="data-label">Last Name:</div>
                <span id="disp-last"></span>
            </div>
            <div class="data-row">
                <div class="data-label">Email:</div>
                <span id="disp-email"></span>
            </div>
            <div class="data-row">
                <div class="data-label">Phone:</div>
                <span id="disp-phone"></span>
            </div>
        </div>
    </section>

    <script>
        const form = document.getElementById("infoForm");

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            const formData = new FormData(this);

            const fInput = document.getElementById("firstName");
            const lInput = document.getElementById("lastName");
            const eInput = document.getElementById("email");
            const pInput = document.getElementById("phone");

            const dispFirst = document.getElementById("disp-first");
            const dispLast = document.getElementById("disp-last");
            const dispEmail = document.getElementById("disp-email");
            const dispPhone = document.getElementById("disp-phone");

            const errorFirst = document.getElementById("error-firstName");
            const errorLast = document.getElementById("error-lastName");
            const errorEmail = document.getElementById("error-email");
            const errorPhone = document.getElementById("error-phone");


            let isValid = true;
            const namePattern = /^[A-Za-z]+$/;
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const numbersPattern = /^\d+$/

            errorFirst.textContent = "";
            errorLast.textContent = "";
            errorEmail.textContent = "";
            errorPhone.textContent = "";

            if (!namePattern.test(fInput.value.trim())) {
                errorFirst.textContent = "Only letters allowed!";
                isValid = false;
            }
            if (!namePattern.test(lInput.value.trim())) {
                errorLast.textContent = "Only letters allowed!";
                isValid = false;
            }
            if (eInput.value === "") {
                errorEmail.textContent = "Email is required!";
                isValid = false;
            } else if (!emailPattern.test(eInput.value.trim())) {
                errorEmail.textContent = "Invalid email!";
                isValid = false;
            }
            if (!numbersPattern.test(pInput.value.trim())) {
                errorPhone.textContent = "Only numbers allowed!";
                isValid = false;
            }
            else if (pInput.value.trim().length !== 10) {
                errorPhone.textContent = "Phone number must be exactly 10 digits!";
                isValid = false;
            }

            if (isValid) {
                const firstName = formData.get("firstName");
                const lastName = formData.get("lastName");
                const Email = formData.get("Email");
                const Phone = formData.get("phone");

                dispFirst.textContent = firstName;
                dispLast.textContent = lastName;
                dispEmail.textContent = Email;
                dispPhone.textContent = Phone;
            }

        });
    </script>

</body>

</html>
